<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile.html</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

.cover-photo{
  width:100%;
  height:250px; 
  
}

/* HEADER */
.profile-header{
    background: white;
    padding:40px 20px; 
    text-align:center;
    border-bottom:1px solid #ddd;
}

/* PROFILE IMAGE */
.profile-header img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid red;
  
}

/* NAME */
.profile-header h1{
    margin-top:15px;
    font-size:30px;
}

/* USERNAME */
.username{
    color:gray;
    margin-top:5px;
}

/* BIO */
.bio{
    margin-top:15px;
    color:#444;
    max-width:500px;
    margin-left:auto;
    margin-right:auto;
}

/* FOLLOW INFO */
.follow-info{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:30px;
    font-weight:bold;
}

/* BUTTONS */
.buttons{
    margin-top:10px;
}

.buttons button{
    padding:10px 15px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
    margin:3px;
}

.follow-btn{
    background:red;
    color:white;
}

.message-btn{
    background:#ddd;
}

/* PINTEREST GRID */
.gallery{
    column-count:4;
    column-gap:12px;
    padding:20px;

    max-width: 850px;
    margin: 0 auto;
}

.gallery img{
    width:100%;
    margin-bottom:12px;
    border-radius:15px;
    transition:0.3s;
    cursor:pointer;
    display: inline-block;
    border: 3px solid red;
}

.gallery img:hover{
    transform:scale(1.03);
    filter: brightness(0.9);
}

/* RESPONSIVE */
@media(max-width:900px){
    .gallery{
        column-count:3;
        column-gap: 10px;
    }
}

@media(max-width:600px){
    .gallery{
        column-count:2;
    }
}

a{
      text-decoration:none;/*Removes the underline*/
      color:inherit; /*Removes the blue color*/
    }

</style>
</head>

<body>

<!-- PROFILE SECTION -->
<div class="profile-header">

    <img src="image.png" alt="Profile Picture">

    <h1>Arlyn Mae Dagumanpan</h1>

    <p class="username">@nic_eee</p>

    <p class="bio">
        Welcome to my Pinterest website.
        I am an Office Administration student.<br> I love photography, art, fashion, and web design.
    </p>

    <div class="follow-info">
        <div>1.5M Followers</div>
        <div>80 Following</div>
        <div>4 Pins</div>
    </div>

    <div class="btn-group">
  <div class="buttons">
        <button class="follow-btn"> <a href="proftoaboutme.html"</a>Follow</button><div class="buttons">
        <button class="message-btn"> <a href="proftoaboutme.html"></a>Message</button></div>
        </div>





<!-- PIN GALLERY -->
<div class="gallery">

    <img src="church.jpg">
    <img src="intramuros.jpg">
    <img src="lamp.jpg">
    <img src="building.jpg">
    <img src="lamp.jpg">
    <img src="building.jpg">


</div>

</body>
</html>
