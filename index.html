<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pinterest Style Website</title>

<!-- Ayos na FontAwesome link para sa eye + social icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
body{ background:#fff; }
header{ display:flex; justify-content:space-between; align-items:center; padding:15px 30px; position: sticky; top: 0; background: white; z-index: 100; }
.logo{ color:#e60023; font-size:24px; font-weight:bold; }
.nav-buttons{ display:flex; gap:12px; }
button{ padding:10px 15px; border:none; border-radius:25px; font-weight:bold; cursor:pointer; transition:0.2s; }
.login{ background:#e60023; color:white; }
.signup{ background:#ef; color:black; }
.login:hover{ background:#c4001d; }
.signup:hover{ background:#ddd; }
.hero{ padding: 60px 20px; text-align:center; }
.hero h1{ font-size:55px; margin-bottom:15px; color: #111; }
.hero p{ font-size:18px; color:#555; margin-bottom:25px; }

/* Masonry Grid Section */
.container { padding: 20px; column-count: 4; column-gap: 15px; width: 200%; margin: 0 auto; }
.pin { display: inline-block; width: 100%; margin-bottom: 15px; border-radius: 16px; overflow: hidden; background-color: #f0f0f0; cursor: zoom-in; }
.pin img { width: 100%; display: block; transition: filter 0.3s; }
.pin:hover img { filter: brightness(0.8); }

@media (max-width: 1100px) { .container { column-count: 4; } }
@media (max-width: 800px) { .container { column-count: 3; } }
@media (max-width: 600px) { .container { column-count: 2; } }

/* Popups and Overlay */
.popup{ display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; padding:30px; width:360px; border-radius:30px; box-shadow:0 0 30px rgba(0,0,0,0.2); z-index:1001; }
.popup h2{ margin-bottom:20px; text-align:center; font-size: 28px; }
.popup input{ width:100%; padding:14px; margin-bottom:12px; border:2px solid #ddd; border-radius:15px; outline: none; }

/* Password Input Container */
.password-container { position: relative; width: 100%; }
.password-container i { position: absolute; right: 15px; top: 18px; cursor: pointer; color: #767676; }

/* Divider */
.divider { text-align: center; margin: 15px 0; color: #767676; font-size: 14px; position: relative; }

/* Social Buttons */
.btn-social { width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; padding: 12px; }
.btn-google { background: white; border: 2px solid black; color: gray; }
.btn-google:hover { background: #f5f5f5; }
.btn-facebook { background: white; border: 2px solid black; color: gray; }
.btn-facebook:hover { background: #f5f5f5; }

.popup button.submit-btn { width:100%; margin-top: 5px; padding: 14px; }
.close{ background:transparent !important; color:#767676 !important; font-size: 14px; width: 100%; margin-top: 5px;}
.overlay{ display:none; position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.6); top:0; left:0; z-index:1000; }
a{ text-decoration:none; color:inherit; }
</style>
</head>
<body>

<header>
  <img src="pinterestlogo.jpg" width="30">
  <div class="logo">Pinterest</div>
  <div class="nav-buttons">
    <button class="login" onclick="openPopup('login')">Log in</button>
    <button class="signup" onclick="openPopup('signup')">Sign up</button>
  </div>
</header>

<section class="hero">
  <h1>Welcome to my page!</h1>
  <p>Discover recipes, fashion, home inspiration, and more.</p>
</section>

<!-- Gallery -->
<div class="container">
  <div class="pin"><img src="church.jpg" alt="Idea"></div>
  <div class="pin"><img src="building.jpg" alt="Idea"></div>
  <div class="pin"><img src="intramuros.jpg" alt="Idea"></div>
  <div class="pin"><img src="lamp.jpg" alt="Idea"></div>
</div>

<div class="overlay" id="overlay" onclick="closePopup()"></div>

<!-- Login Popup -->
<div class="popup" id="loginPopup">
  <h2>Log in</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <div class="password-container">
    <input type="password" id="loginPassword" placeholder="Password">
    <i class="fa-solid fa-eye" onclick="togglePassword('loginPassword', this)"></i>
  </div>
  <button class="login submit-btn" onclick="login()">Log in</button>
  
  <div class="divider">OR</div>
  <button class="btn-social btn-google" onclick="alert('Google Login Client Triggered')">
    <i class="fa-brands fa-google"></i>
    <img src="google.png" width="20"><a href="https://www.google.com"> Continue with Google
  </button>
  <button class="btn-social btn-facebook" onclick="alert('Facebook Login Client Triggered')">
    <i class="fa-brands fa-facebook"></i>
    <img src="facebook.jpeg" width="12"><a href="https://www.facebook.com"> Continue with Facebook
  </button>
  <button class="close" onclick="closePopup()">Cancel</button>
</div>

<!-- Signup Popup -->
<div class="popup" id="signupPopup">
  <h2>Sign up</h2>
  <input type="text" placeholder="Full Name">
  <input type="email" placeholder="Email">
  <div class="password-container">
    <input type="password" id="signupPassword" placeholder="Create a password">
    <i class="fa-solid fa-eye" onclick="togglePassword('signupPassword', this)"></i>
  </div>
  <button class="login submit-btn" onclick="alert('Success!')">Continue</button>
  <div class="divider">OR</div>
  <button class="btn-social btn-google" onclick="alert('Google Signup Client Triggered')">
    <i class="fa-brands fa-google"></i>
    <img src="google.png" width="20"> Continue with Google
  </button>
  <button class="close" onclick="closePopup()">Cancel</button>
</div>

<script> 
function openPopup(type){
  document.getElementById("overlay").style.display = "block";
  document.getElementById(type === "login" ? "loginPopup" : "signupPopup").style.display = "block";
}

function closePopup(){
  document.getElementById("overlay").style.display = "none";
  document.querySelectorAll('.popup').forEach(p => p.style.display = "none");
}

// Password Visibility Toggle Logic
function togglePassword(inputId, icon) {
  const passwordInput = document.getElementById(inputId);
  if (passwordInput.type === "password") {
    passwordInput.type = "text";
    icon.classList.remove("fa-eye");
    icon.classList.add("fa-eye-slash");
  } else {
    passwordInput.type = "password";
    icon.classList.remove("fa-eye-slash");
    icon.classList.add("fa-eye");
  }
}

  let email = document.getElementById("loginEmail").value; 
  let password = document.getElementById("loginPassword").value; 

  if(email === "Arlynmaedagumanpan@gmail.com" && password === "0000") { 
    // Profile 1
    window.location.href = "Profile.html"; 
  } 
  else if(email === "manuelangelicajane@gmail.com" && password === "muchopicante") { 
    // Profile 2 
    window.location.href = "N.html"; 
  } 
  else { 
    alert("Invalid email or password."); 
  } 
}
</script>

</body>
</html>
