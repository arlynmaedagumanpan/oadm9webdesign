<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Photo Gallery Layouts</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Segoe UI", sans-serif;
    background:#f8f6f2;
    color:#222;
    padding:25px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:30px;
    max-width:1500px;
    margin:auto;
}

.card{
    background:#fff;
}

.card img{
    width:100%;
    height:360px;
    object-fit:cover;
    display:block;
}

.content{
    text-align:center;
    padding:18px 20px 25px;
}

.content h2{
    font-size:20px;
    font-weight:500;
    margin-bottom:12px;
}

.content p{
    font-size:15px;
    line-height:1.5;
    color:#444;
}

/* Responsive */

@media(max-width:1000px){
    .gallery{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:700px){
    .gallery{
        grid-template-columns:1fr;
    }
}
</style>
<h1 style="text-align:center">CMG DAY</h1>
</head>

<body>

<div class="gallery">

    <div class="card">
        <img src="picture2.jpeg" alt="Grid Layout">
        <div class="content">
            <h2>CMG Day Singing Competition</h2>
            <p>
                That wasn't just a performance. That what a proof of your talent.
            </p>
        </div>
    </div>

    <div class="card">
        <img src="picture6.jpeg" alt="Salon Style">
        <div class="content">
            <h2>CMG Day Bridgerton Theme</h2>
            <p>
                Corsets, curls, and a hint of mischief. Bridgerton night.
            </p>
        </div>
    </div>

    <div class="card">
        <img src="picture3.jpeg" alt="Two Rows">
        <div class="content">
            <h2>Era's Tour</h2>
            <p>
                Just me, my eras, and the music that raised me. All too well.
            </p>
        </div>
    </div>

</div>

</body>
</html>
